<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coffee Shop</title>
    <link rel="stylesheet" href="app.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>
<body>
    <header> Happy Apple Coffee Shop</header>
    <main>
        <div id="app">
            <!--Lista de Productos-->
            <section id="product-list">
                <h3>Product List</h3>
                <div id="product-1">
                    <span>Coffee Mug</span>
                    <span>price: $5.35</span>
                    <button class="btn-add">Add to cart</button>
                </div>
                <div id="product-2">
                    <span>Coffee Toaster</span>
                    <span>price: $5.35</span>
                    <button class="btn-add">Add to cart</button>
                </div>
                 <div id="product-3">
                    <span>Italian Coffe Maker</span>
                    <span>price: $5.35</span>
                    <button class="btn-add">Add to cart</button>
                </div>
                <div id="product-4">
                    <span>French Coffe Maker</span>
                    <span>price: $5.35</span>
                    <button class="btn-add">Add to cart</button>
                </div>
                <div id="product-5">
                    <span>Chinese Coffe Maker</span>
                    <span>price: $10.35</span>
                    <button class="btn-add">Add to cart</button>
                </div>
            </section>
        <!--Carta Pannel-->
            <section id="cart-panel">
                <h3>Cart</h3>
                <div id="cart-items">
                </div>
                <div id="empty-state">
                    <p>Your cart is empty.</p>
                </div>
                <div id="cart-total">
                    <span>Total: $ 0</span>
                </div>

            </section>
            <section class="picture">
                <article class="images">
                    <img src="./picture.jpg" class="picture" alt="facilities-coffee-shop">
                    <span class="facilities">Facilities</span>
                </article>
                <article class="images-1">
                    <img src="./picture-1.jpg" class="picture-1" alt="products-coffee">
                    <span class="products-coffee">Our Coffees</span>
                </article>
            </section>
        </div>
    </main>
    <script src="cart.js"></script>
    <script src="app.js"></script>
</body>
</html>
